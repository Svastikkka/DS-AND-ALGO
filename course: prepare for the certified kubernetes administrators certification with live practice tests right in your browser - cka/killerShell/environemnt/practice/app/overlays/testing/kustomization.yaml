resources:
  - ../../base
nameSuffix: -testing

commonLabels:
  env: testing

configMapGenerator:
  - name: app-config
    literals:
      - LOG_LEVEL=debug

generatorOptions:
  disableNameSuffixHash: true

patches:
  - patch: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: myapp
      spec:
        replicas: 10

